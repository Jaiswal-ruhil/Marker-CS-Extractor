name: Build Windows Executable

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Windows executable
        run: |
          pyinstaller `
            --onefile `
            --name "MarkerCSExtractor" `
            --collect-all marker `
            --hidden-import pandas `
            --hidden-import openpyxl `
            --hidden-import openpyxl.styles `
            --hidden-import openpyxl.utils `
            main.py

      - name: Verify build
        run: |
          dir dist\
          
      - name: Upload Windows executable
        uses: actions/upload-artifact@v4
        with:
          name: MarkerCSExtractor-Windows
          path: dist\MarkerCSExtractor.exe
          retention-days: 30

      - name: Create Release (on push to main)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Windows Build #${{ github.run_number }}"
          body: |
            Automated Windows build from commit ${{ github.sha }}

            **How to use:**
            1. Download `MarkerCSExtractor.exe`
            2. Double-click it, or run from Command Prompt:
               `MarkerCSExtractor.exe invoice.pdf`
            Or drag-and-drop PDF files onto the executable in File Explorer.
          files: dist\MarkerCSExtractor.exe
          draft: false
          prerelease: false
