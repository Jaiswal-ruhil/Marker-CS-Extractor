name: Build macOS Executable

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Set version
        id: set-version
        shell: pwsh
        run: |
          $content = Get-Content main.py -Raw
          if ($content -match '^(?:__version__|VERSION)\s*=\s*"([^"]+)"') {
            Write-Output "version=$($matches[1])" >> $env:GITHUB_OUTPUT
          } else {
            throw "Unable to parse version from main.py"
          }

      - name: Build macOS executable
        run: |
          pyinstaller \
            --onefile \
            --name "MarkerCSExtractor-v${{ steps.set-version.outputs.version }}" \
            --hidden-import pandas \
            --hidden-import openpyxl \
            --hidden-import openpyxl.styles \
            --hidden-import openpyxl.utils \
            main.py

      - name: Verify build
        run: |
          ls -lh dist/
          file dist/MarkerCSExtractor-v${{ steps.set-version.outputs.version }}

      - name: Upload macOS executable
        uses: actions/upload-artifact@v4
        with:
          name: MarkerCSExtractor-macOS
          path: dist/MarkerCSExtractor
          retention-days: 30

      - name: Create Release (on push to main)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "macOS Build #${{ github.run_number }}"
          body: |
            Automated macOS build from commit ${{ github.sha }}

            **How to use:**
            1. Download `MarkerCSExtractor`
            2. Run `chmod +x MarkerCSExtractor` in Terminal
            3. Run: `./MarkerCSExtractor invoice.pdf`
            Or drag-and-drop PDF files onto the executable in Finder.
          files: dist/MarkerCSExtractor
          draft: false
          prerelease: false